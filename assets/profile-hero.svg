  <text x="206" y="190" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2">NATIONAL CANCER DATA CENTER</text>
  <text x="206" y="262" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">NCDCbioinformatics</text>
  <text x="206" y="318" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Research software for panel NGS harmonization, nomenclature normalization,</text>
