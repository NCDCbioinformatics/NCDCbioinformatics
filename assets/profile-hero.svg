      <stop stop-color="#071A2F"/>
      <stop offset="0.5" stop-color="#0F3C68"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="panel" x1="164" y1="116" x2="1114" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
